<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถานีแพ็ค — Outbound</title>
<style>
  :root {
    --bg:        #0F1117;
    --surface:   #1A1D27;
    --surface2:  #222538;
    --border:    #2E3250;
    --accent:    #4F6EF7;
    --accent2:   #7C3AED;
    --success:   #22C55E;
    --warn:      #F59E0B;
    --danger:    #EF4444;
    --text:      #F0F2FF;
    --muted:     #8890B5;
    --font:      'Sarabun', system-ui, sans-serif;
    --mono:      'JetBrains Mono', 'Courier New', monospace;
    --radius:    12px;
    --radius-sm: 8px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
  .logo span { color: var(--accent); }
  .station-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
  .station-badge strong { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .clock { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    height: calc(100vh - 56px);
  }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .sidebar { height: auto; max-height: 40vh; }
  }

  /* ── SIDEBAR — ORDER LIST ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }

  .filter-tabs { display: flex; gap: 6px; padding: 10px 16px; flex-shrink: 0; }
  .filter-tab {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .order-list { flex: 1; overflow-y: auto; padding: 8px; }
  .order-list::-webkit-scrollbar { width: 4px; }
  .order-list::-webkit-scrollbar-track { background: transparent; }
  .order-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .order-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .order-card:hover { border-color: var(--accent); }
  .order-card.active { border-color: var(--accent); background: #1e2240; }
  .order-card.done { opacity: .5; }
  .order-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .order-id { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--warn);
    flex-shrink: 0;
  }
  .status-dot.done { background: var(--success); }
  .status-dot.packing { background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .order-customer { font-size: 13px; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-meta { display: flex; gap: 8px; align-items: center; }
  .carrier-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .carrier-instant { background: #1a3a5c; color: #60B0FF; }
  .carrier-shp { background: #2d1a5c; color: #B060FF; }
  .carrier-walkin { background: #1a4a2a; color: #60FF90; }
  .item-count { font-size: 11px; color: var(--muted); }

  /* ── MAIN PANEL ── */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
  }
  .empty-icon { font-size: 48px; opacity: .3; }
  .empty-text { font-size: 15px; }

  /* ORDER DETAIL */
  .order-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .detail-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .detail-id { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
  .detail-customer { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 999px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width .3s; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label span { font-size: 12px; color: var(--muted); }
  .progress-label strong { font-size: 13px; color: var(--text); }

  /* SCAN AREA */
  .scan-area {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .scan-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
  .scan-input-row { display: flex; gap: 8px; }
  .scan-input {
    flex: 1;
    background: var(--surface2);
    border: 2px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    outline: none;
    transition: border-color .15s;
  }
  .scan-input:focus { border-color: #7C3AED; }
  .scan-input::placeholder { color: var(--muted); font-family: var(--font); font-size: 13px; }
  .scan-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .scan-btn:hover { background: #3d5bd4; }

  /* ITEM LIST */
  .item-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .item-list::-webkit-scrollbar { width: 4px; }
  .item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    transition: all .2s;
  }
  .item-row.checked {
    border-color: var(--success);
    background: #0d2a1a;
  }
  .item-row.error-flash {
    border-color: var(--danger);
    background: #2a0d0d;
    animation: flash .3s ease;
  }
  @keyframes flash { 0%{transform:translateX(-4px)} 25%{transform:translateX(4px)} 75%{transform:translateX(-2px)} 100%{transform:translateX(0)} }

  .item-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .item-check.checked { background: var(--success); border-color: var(--success); }
  .item-check.checked::after { content: "✓"; color: #fff; font-size: 13px; font-weight: 700; }

  .item-info { flex: 1; }
  .item-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .item-sku { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .item-qty {
    font-size: 20px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    min-width: 40px;
    text-align: right;
  }
  .item-qty.checked { color: var(--success); }
  .item-unit { font-size: 11px; color: var(--muted); text-align: right; }

  /* FOOTER ACTION */
  .detail-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; font-size: 15px; }
  .btn-primary:hover { background: #3d5bd4; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; flex: 1; font-size: 15px; }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
  .toast {
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    animation: slideIn .2s ease;
    max-width: 280px;
  }
  .toast-success { background: #14532d; border: 1px solid var(--success); color: #86efac; }
  .toast-error { background: #450a0a; border: 1px solid var(--danger); color: #fca5a5; }
  .toast-info { background: #1e1b4b; border: 1px solid var(--accent); color: #a5b4fc; }
  @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    display: none;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 400px;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    margin-bottom: 14px;
  }
  .modal-btns { display: flex; gap: 8px; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 10px;
  }
  .complete-banner {
    background: linear-gradient(135deg, #0d2a1a, #142a0d);
    border: 1px solid var(--success);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    text-align: center;
    margin-bottom: 12px;
    font-size: 15px;
    color: #86efac;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <div class="logo">📦 <span>Outbound</span> Pack</div>
  <div class="header-right">
    <span class="clock" id="clock">--:--:--</span>
    <div class="station-badge" onclick="showStationModal()">สถานี: <strong id="stationName">A1</strong></div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>รายการออเดอร์</h2>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ค้นหา Order ID / ชื่อลูกค้า..." oninput="filterOrders()">
      </div>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">ทั้งหมด</button>
      <button class="filter-tab" onclick="setFilter('pending', this)">รอแพ็ค</button>
      <button class="filter-tab" onclick="setFilter('packing', this)">กำลังแพ็ค</button>
      <button class="filter-tab" onclick="setFilter('done', this)">เสร็จแล้ว</button>
    </div>
    <div class="order-list" id="orderList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div class="empty-text">เลือกออเดอร์เพื่อเริ่มแพ็คสินค้า</div>
    </div>
    <div class="order-detail" id="orderDetail" style="display:none;">
      <div class="detail-header">
        <div class="detail-top">
          <div>
            <div class="detail-id" id="detailId"></div>
            <div class="detail-customer" id="detailCustomer"></div>
          </div>
          <div id="detailCarrierTag"></div>
        </div>
        <div class="progress-label">
          <span id="progressLabel">เช็คสินค้า</span>
          <strong id="progressCount">0 / 0</strong>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
      </div>

      <div class="scan-area">
        <div class="scan-label">🔫 ยิง Barcode พัสดุ → เปิดออเดอร์ &nbsp;|&nbsp; ยิง SKU สินค้า → เช็คลิสต์</div>
        <div class="scan-input-row">
          <input class="scan-input" id="scanInput" type="text" placeholder="ยิง Barcode พัสดุเพื่อเปิดออเดอร์ / ยิง SKU สินค้าเพื่อเช็ค..." autocomplete="off" onkeydown="if(event.key==='Enter') scanItem()">
          <button class="scan-btn" onclick="scanItem()">✓ ยืนยัน</button>
        </div>
      </div>

      <div class="item-list" id="itemList"></div>

      <div class="detail-footer" id="detailFooter"></div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- Station Modal -->
<div class="modal-overlay" id="stationModal">
  <div class="modal">
    <h3>เปลี่ยนชื่อสถานี</h3>
    <input type="text" id="stationInput" placeholder="เช่น A1, B2, โต๊ะ 3..." maxlength="10">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="hideStationModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveStation()">บันทึก</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────

    ]
  },

let currentFilter = "all";
let currentOrderId = null;

// ── CLOCK ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}
setInterval(updateClock, 1000);
updateClock();

// ── RENDER ORDER LIST ─────────────────────────────────────────
function renderOrderList() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("orderList");
  list.innerHTML = "";

  const filtered = ORDERS.filter(o => {
    const matchFilter = currentFilter === "all" || o.status === currentFilter;
    const matchSearch = o.id.toLowerCase().includes(search) || o.customer.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:24px;font-size:13px;">ไม่พบออเดอร์</div>`;
    return;
  }

  filtered.forEach(order => {
    const total = order.items.reduce((s, i) => s + i.qty, 0);
    const checked = order.items.reduce((s, i) => s + i.checked, 0);
    const carrierClass = order.carrier === "Instant" ? "carrier-instant" : order.carrier === "SHP Food" ? "carrier-shp" : "carrier-walkin";
    const statusDot = order.status === "done" ? "done" : order.status === "packing" ? "packing" : "";

    const card = document.createElement("div");
    card.className = `order-card${order.status === "done" ? " done" : ""}${currentOrderId === order.id ? " active" : ""}`;
    card.innerHTML = `
      <div class="order-top">
        <span class="order-id">${order.id}</span>
        <span class="status-dot ${statusDot}"></span>
      </div>
      <div class="order-customer">${order.customer}</div>
      <div class="order-meta">
        <span class="carrier-tag ${carrierClass}">${order.carrier}</span>
        <span class="item-count">${checked}/${total} ชิ้น</span>
      </div>
    `;
    card.onclick = () => openOrder(order.id);
    list.appendChild(card);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderOrderList();
}

function filterOrders() { renderOrderList(); }

// ── OPEN ORDER ────────────────────────────────────────────────
function openOrder(id) {
  currentOrderId = id;
  const order = ORDERS.find(o => o.id === id);
  if (!order) return;

  if (order.status === "pending") order.status = "packing";

  document.getElementById("emptyState").style.display = "none";
  document.getElementById("orderDetail").style.display = "flex";

  const carrierClass = order.carrier === "Instant" ? "carrier-instant" : order.carrier === "SHP Food" ? "carrier-shp" : "carrier-walkin";
  document.getElementById("detailId").textContent = order.id;
  document.getElementById("detailCustomer").textContent = order.customer;
  document.getElementById("detailCarrierTag").innerHTML = `<span class="carrier-tag ${carrierClass}" style="font-size:13px;padding:4px 12px">${order.carrier}</span>`;

  updateProgress(order);
  renderItems(order);
  renderFooter(order);
  renderOrderList();

  setTimeout(() => document.getElementById("scanInput").focus(), 100);
}

function updateProgress(order) {
  const total = order.items.reduce((s, i) => s + i.qty, 0);
  const checked = order.items.reduce((s, i) => s + i.checked, 0);
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressCount").textContent = `${checked} / ${total} ชิ้น`;
  document.getElementById("progressLabel").textContent = pct === 100 ? "✅ แพ็คครบแล้ว!" : "เช็คสินค้า";
}

function renderItems(order) {
  const list = document.getElementById("itemList");
  const allDone = order.status === "done";

  if (allDone) {
    list.innerHTML = `<div class="complete-banner">✅ แพ็คสินค้าครบแล้ว — พร้อมส่งมอบ</div>`;
  }

  const section = document.createElement("div");
  section.className = "section-label";
  section.textContent = "รายการสินค้า";
  if (!allDone) list.innerHTML = "";
  list.appendChild(section);

  order.items.forEach((item, idx) => {
    const row = document.createElement("div");
    const done = item.checked >= item.qty;
    row.className = `item-row${done ? " checked" : ""}`;
    row.id = `item-${idx}`;
    row.innerHTML = `
      <div class="item-check ${done ? "checked" : ""}" onclick="toggleItem(${idx})"></div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-sku">${item.sku}</div>
      </div>
      <div>
        <div class="item-qty ${done ? "checked" : ""}">${item.checked}/${item.qty}</div>
        <div class="item-unit">ชิ้น</div>
      </div>
    `;
    list.appendChild(row);
  });
}

function renderFooter(order) {
  const footer = document.getElementById("detailFooter");
  const total = order.items.reduce((s, i) => s + i.qty, 0);
  const checked = order.items.reduce((s, i) => s + i.checked, 0);
  const allDone = checked >= total;

  if (order.status === "done") {
    footer.innerHTML = `<button class="btn btn-ghost" onclick="reopenOrder()">↩ แก้ไข</button><div style="flex:1;text-align:center;font-size:14px;color:var(--success);font-weight:600;">✅ เสร็จสิ้น</div>`;
  } else if (allDone) {
    footer.innerHTML = `<button class="btn btn-ghost" onclick="clearAll()">ล้างทั้งหมด</button><button class="btn btn-success" onclick="completeOrder()">✅ ยืนยันแพ็คเสร็จ</button>`;
  } else {
    footer.innerHTML = `<button class="btn btn-ghost" onclick="clearAll()">ล้างทั้งหมด</button><button class="btn btn-primary" disabled id="completeBtn">ยืนยันแพ็คเสร็จ</button>`;
  }
}

// ── SCAN ──────────────────────────────────────────────────────
function scanItem() {
  const input = document.getElementById("scanInput");
  const val = input.value.trim();
  if (!val) return;

  const valUpper = val.toUpperCase();

  // ── ยิง Barcode พัสดุ → เปิด Order อัตโนมัติ ──
  if (BARCODE_MAP[val] || BARCODE_MAP[valUpper]) {
    const orderId = BARCODE_MAP[val] || BARCODE_MAP[valUpper];
    const order = ORDERS.find(o => o.id === orderId);
    if (order) {
      input.value = "";
      input.focus();
      openOrder(orderId);
      showToast(`📦 เปิดออเดอร์ ${orderId} — ${order.customer}`, "info");
      return;
    }
  }

  // ── ยิง SKU สินค้าใน Order ที่เปิดอยู่ ──
  const order = ORDERS.find(o => o.id === currentOrderId);
  if (!order) {
    showToast("ยิง Barcode พัสดุก่อนเพื่อเปิดออเดอร์", "error");
    input.value = "";
    return;
  }
  if (order.status === "done") {
    showToast("ออเดอร์นี้แพ็คเสร็จแล้ว", "info");
    input.value = "";
    return;
  }

  const item = order.items.find(i =>
    i.sku.toUpperCase() === valUpper ||
    i.name.toUpperCase().includes(valUpper)
  );

  if (!item) {
    showToast("ไม่พบสินค้า: " + val, "error");
    input.style.borderColor = "var(--danger)";
    setTimeout(() => input.style.borderColor = "var(--accent)", 600);
  } else if (item.checked >= item.qty) {
    showToast(`${item.name} — ครบแล้ว (${item.qty} ชิ้น)`, "info");
  } else {
    item.checked++;
    showToast(`✓ ${item.name} (${item.checked}/${item.qty})`, "success");
    updateProgress(order);
    renderItems(order);
    renderFooter(order);
    renderOrderList();
  }

  input.value = "";
  input.focus();
}

function toggleItem(idx) {
  const order = ORDERS.find(o => o.id === currentOrderId);
  if (!order || order.status === "done") return;
  const item = order.items[idx];
  item.checked = item.checked >= item.qty ? 0 : item.qty;
  updateProgress(order);
  renderItems(order);
  renderFooter(order);
  renderOrderList();
}

function clearAll() {
  const order = ORDERS.find(o => o.id === currentOrderId);
  if (!order) return;
  order.items.forEach(i => i.checked = 0);
  updateProgress(order);
  renderItems(order);
  renderFooter(order);
  renderOrderList();
}

function completeOrder() {
  const order = ORDERS.find(o => o.id === currentOrderId);
  if (!order) return;
  order.status = "done";
  showToast(`✅ ${order.id} — แพ็คเสร็จแล้ว!`, "success");
  renderItems(order);
  renderFooter(order);
  renderOrderList();
}

function reopenOrder() {
  const order = ORDERS.find(o => o.id === currentOrderId);
  if (!order) return;
  order.status = "packing";
  renderItems(order);
  renderFooter(order);
  renderOrderList();
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type = "info") {
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ── STATION MODAL ─────────────────────────────────────────────
function showStationModal() {
  document.getElementById("stationInput").value = document.getElementById("stationName").textContent;
  document.getElementById("stationModal").classList.add("show");
  setTimeout(() => document.getElementById("stationInput").focus(), 100);
}
function hideStationModal() {
  document.getElementById("stationModal").classList.remove("show");
}
function saveStation() {
  const val = document.getElementById("stationInput").value.trim();
  if (val) document.getElementById("stationName").textContent = val;
  hideStationModal();
}
document.getElementById("stationModal").addEventListener("click", function(e) {
  if (e.target === this) hideStationModal();
});

// ── INIT ──────────────────────────────────────────────────────
renderOrderList();
</script>
</body>
</html>
